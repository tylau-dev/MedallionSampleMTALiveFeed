services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.7
    environment:
      - ZOOKEEPER_CLIENT_PORT=${ZOOKEEPER_CLIENT_PORT:-2181}
      - ZOOKEEPER_TICK_TIME=${ZOOKEEPER_TICK_TIME:-2000}
    networks:
      - data-network

  kafka:
    image: confluentinc/cp-kafka:7.7.7
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    env_file:
      - .env
    environment:
      - KAFKA_BROKER_ID=${KAFKA_BROKER_ID:-1}
      - KAFKA_ZOOKEEPER_CONNECT=${KAFKA_ZOOKEEPER_CONNECT:-zookeeper:2181}
      - KAFKA_ADVERTISED_LISTENERS=${KAFKA_ADVERTISED_LISTENERS:-PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092}
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:-PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT}
      - KAFKA_INTER_BROKER_LISTENER_NAME=${KAFKA_INTER_BROKER_LISTENER_NAME:-PLAINTEXT}
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:-1}
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "${KAFKA_UI_PORT:-8085}:8085"
    env_file:
      - .env
    environment:
      - KAFKA_CLUSTERS_0_NAME=${KAFKA_UI_CLUSTER_NAME:-local}
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      - KAFKA_CLUSTERS_0_ZOOKEEPER=${KAFKA_ZOOKEEPER_CONNECT:-zookeeper:2181}
    networks:
      - data-network

  mta-producer:
    build: ./mta-producer
    container_name: mta-producer
    depends_on:
      kafka:
        condition: service_healthy
    restart: always
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
    networks:
      - data-network

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9095}:9001"
    env_file:
      - .env
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - data-network

  mc:
    image: minio/mc
    depends_on:
      - minio
    networks:
      - data-network
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio ${S3_ENDPOINT:-http://minio:9000} ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD:-password}) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb myminio/mta-bronze;
      /usr/bin/mc mb myminio/mta-silver;
      /usr/bin/mc mb myminio/mta-gold;
      exit 0;
      "

  spark-master:
    build: ./spark
    container_name: spark-master
    env_file:
      - .env
    ports:
      - "${SPARK_MASTER_UI_PORT:-8080}:8080"
      - "${SPARK_MASTER_PORT:-7077}:7077"
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - HOME=/tmp
      - SPARK_USER_HOME_DIR=/opt/spark/work-dir
      - SPARK_DAEMON_JAVA_OPTS="-Divy.home=/tmp/.ivy2"
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-admin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-password}
    volumes:
      - ./apps:/opt/spark/apps
      - ./data:/opt/spark/data
      - .:/opt/spark/work-dir
    command: >
      /bin/sh -c "mkdir -p /tmp/.ivy2 && chmod -R 777 /tmp/.ivy2 && /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master"
    networks:
      - data-network

  spark-worker:
    build: ./spark
    container_name: spark-worker
    ports:
      - "8083:8083"
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - "JAVA_TOOL_OPTIONS=-Duser.home=/tmp -Djava.io.tmpdir=/tmp"
      - SPARK_DRIVER_HOST=spark-master
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-admin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-password}
      - SPARK_WORKER_CORES=4
      - SPARK_WORKER_MEMORY=4G
      - SPARK_SHUFFLE_SERVICE_ENABLED=true
      - SPARK_SCHEDULER_MODE=FAIR
    volumes:
    - .:/opt/spark/work-dir
    command: >
      /bin/sh -c "mkdir -p /tmp/.ivy2 && chmod -R 777 /tmp/.ivy2 && /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077"
    depends_on:
      - spark-master
    networks:
      - data-network

networks:
  data-network:
    driver: bridge